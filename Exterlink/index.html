function useVP() {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return { isMobile: w < 768, isTablet: w < 1024, w };
}

// ── Video Card ─────────────────────────────────────────────────
function VideoCard({ sz }) {
  const ref = React.useRef(null);
  const [muted, setMuted] = React.useState(true);

  React.useEffect(() => {
    const v = ref.current;
    if (!v) return;
    const play = () => {
      v.muted = true;
      v.currentTime = 0.01;
      const p = v.play();
      if (p) p.catch(() => {});
    };
    if (v.readyState >= 1) play();
    else v.addEventListener('loadedmetadata', play, { once: true });
  }, []);

  const toggleMute = () => {
    const v = ref.current;
    if (!v) return;
    const next = !muted;
    v.muted = next;
    setMuted(next);
  };

  return (
    <div style={{ position:'relative', width:'100%', height:'100%' }}>
      <video
        ref={ref}
        src="./videos/hero-video.mp4"
        autoPlay loop muted playsInline preload="metadata"
        style={{ width:'100%', height:'100%', display:'block', objectFit:'cover' }}
      />
      {/* Live pill */}
      <div style={{ position:'absolute', top:8, left:8, display:'flex', alignItems:'center', gap:5, background:'rgba(13,11,31,.72)', backdropFilter:'blur(8px)', borderRadius:100, padding:'4px 10px', pointerEvents:'none' }}>
        <div style={{ width:6, height:6, borderRadius:'50%', background:'#22C55E', animation:'blink 1.5s ease infinite' }}/>
        <span style={{ fontSize:9, fontWeight:700, color:'#86EFAC', letterSpacing:'.08em', textTransform:'uppercase' }}>Live clone</span>
      </div>
      {/* Unmute button */}
      <button onClick={toggleMute} style={{ position:'absolute', bottom:8, right:8, display:'flex', alignItems:'center', gap:5, background:'rgba(13,11,31,.78)', backdropFilter:'blur(10px)', border:'1px solid rgba(255,255,255,.12)', borderRadius:100, padding:'5px 10px', cursor:'pointer', transition:'all 200ms ease' }}
        onMouseEnter={e => e.currentTarget.style.background='rgba(139,92,246,.45)'}
        onMouseLeave={e => e.currentTarget.style.background='rgba(13,11,31,.78)'}>
        {muted ? (
          /* Muted icon */
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <line x1="23" y1="9" x2="17" y2="15" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
            <line x1="17" y1="9" x2="23" y2="15" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        ) : (
          /* Unmuted icon */
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        )}
        <span style={{ fontSize:9, fontWeight:600, color:'white', letterSpacing:'.06em', textTransform:'uppercase' }}>{muted ? 'Unmute' : 'Mute'}</span>
      </button>
    </div>
  );
}

// ── Footer ─────────────────────────────────────────────────────
function Footer() {
  const { isMobile } = useVP();
  return (
    <footer style={{ background:BG1, borderTop:'1px solid rgba(255,255,255,.05)', padding:`24px ${isMobile?20:48}px` }}>
      <div style={{ maxWidth:1200, margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:14 }}>

// ── App ────────────────────────────────────────────────────────
function App() {
  React.useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold:.12 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
  return (
    <>
      <Nav/>
      <main>
        <Hero/>
        <CredStrip/>
        <TrustBar/>
        <Features/>
        <HowItWorks/>
        <Results/>
        <Guarantee/>
        <FinalCTA/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
